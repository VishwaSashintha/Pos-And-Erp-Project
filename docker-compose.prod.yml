version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: gradge-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: gradge
      POSTGRES_USER: gradge
      POSTGRES_PASSWORD: gradge123
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gradge-redis-prod
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gradge-rabbitmq-prod
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    container_name: gradge-minio-prod
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: gradge
      MINIO_ROOT_PASSWORD: gradge123
    command: server /data --console-address ":9001"
    volumes:
      - minio_prod_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gradge-backend-prod
    restart: always
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/gradge
      - SPRING_DATASOURCE_USERNAME=gradge
      - SPRING_DATASOURCE_PASSWORD=gradge123
      - SPRING_REDIS_HOST=redis
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gradge-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_prod_data:
  minio_prod_data:
