name: Gradge ERP CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven (Skip Tests)
      run: mvn -B package -DskipTests

    - name: Build Docker Image
      run: docker build -t gradge/erp-backend:${{ github.sha }} .

    - name: Log in to Registry
      # In a real environment, uncomment and set secrets
      # uses: docker/login-action@v3
      # with:
      #   username: ${{ secrets.DOCKER_USERNAME }}
      #   password: ${{ secrets.DOCKER_PASSWORD }}
      run: echo "Logged in to Docker Registry"

    - name: Push Docker Image
      # run: docker push gradge/erp-backend:${{ github.sha }}
      run: echo "Pushed gradge/erp-backend:${{ github.sha }}"
