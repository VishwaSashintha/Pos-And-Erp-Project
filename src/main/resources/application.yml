server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gradge
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  redis:
    host: localhost
    port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    org.springframework: INFO

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: when-authorized

# App Configuration (CORS, JWT)
app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"
  jwt:
    secret: "gradge-erp-super-secret-key-please-change-in-production"
    expiration-ms: 86400000