server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gradge
    username: postgres
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  redis:
    host: localhost
    port: 6379

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB
      enabled: true

logging:
  level:
    org.springframework: INFO

# Spring Boot Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

stripe:
  api-key: "sk_test_mock_secret_key"
  webhook-secret: "whsec_mock_webhook_secret"

# App Configuration (CORS, JWT)
app:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"
  jwt:
    secret: "gradge-erp-super-secret-key-please-change-in-production"
    expiration-ms: 900000

# Backup Configuration
backup:
  directory: ./backups
  retention-days: 30