version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: gradge-postgres
    restart: always
    environment:
      POSTGRES_DB: gradge
      POSTGRES_USER: gradge
      POSTGRES_PASSWORD: gradge123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: gradge-redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: gradge-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio
    container_name: gradge-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: gradge
      MINIO_ROOT_PASSWORD: gradge123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  minio_data: